# Build and push the frontend image to AWS ECR, then redeploy the frontend ECS service.
#
# Two environments, selected by branch:
#   - main   → TEST
#   - master → PROD
#
# Required GitHub secrets (use the *_TEST / *_PROD suffix per environment).
# Shared:
#   secrets.AWS_ACCESS_KEY_ID
#   secrets.AWS_SECRET_ACCESS_KEY
#   vars.AWS_REGION  or  secrets.AWS_REGION
#
# Per-environment (replace SUFFIX with TEST or PROD):
#   secrets.ECS_CLUSTER_<SUFFIX>
#   secrets.ECS_FRONTEND_SERVICE_<SUFFIX>   (preferred for frontend deploys)
#   secrets.ECS_SERVICE_<SUFFIX>            (fallback, single-service deploys)
#
# Image tags include the environment so test/prod don't collide:
#   <env>-latest, <env>-<git-sha>

name: Build and push frontend to AWS ECR
 
on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (overrides branch detection)"
        required: false
        type: choice
        options:
          - test
          - prod
 
permissions:
  contents: read

concurrency:
  group: server-${{ github.ref }}-${{ inputs.environment || 'branch' }}
  cancel-in-progress: true

env:
  ECR_REPOSITORY: rfp-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target environment
        id: env
        shell: bash
        run: |
          if [ -n "${{ inputs.environment }}" ]; then
            ENV_NAME="${{ inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/master" ]; then
            ENV_NAME="prod"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV_NAME="test"
          else
            echo "Branch ${{ github.ref }} is not deployable" >&2
            exit 1
          fi
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"
          echo "Deploying to: $ENV_NAME"

      - name: Resolve environment settings
        id: vars
        shell: bash
        env:
          ENV_NAME: ${{ steps.env.outputs.env_name }}
          AWS_REGION_VAR: ${{ vars.AWS_REGION }}
          AWS_REGION_SECRET: ${{ secrets.AWS_REGION }}
          ECS_CLUSTER_TEST: ${{ secrets.ECS_CLUSTER_TEST }}
          ECS_CLUSTER_PROD: ${{ secrets.ECS_CLUSTER_PROD }}
          ECS_FRONTEND_SERVICE_TEST: ${{ secrets.ECS_FRONTEND_SERVICE_TEST }}
          ECS_FRONTEND_SERVICE_PROD: ${{ secrets.ECS_FRONTEND_SERVICE_PROD }}
          ECS_SERVICE_TEST: ${{ secrets.ECS_SERVICE_TEST }}
          ECS_SERVICE_PROD: ${{ secrets.ECS_SERVICE_PROD }}
        run: |
          set -euo pipefail

          UP=$(echo "$ENV_NAME" | tr '[:lower:]' '[:upper:]')
          pick() {
            local name="${1}_${UP}"
            printenv "$name" || true
          }

          REGION="${AWS_REGION_VAR:-$AWS_REGION_SECRET}"
          CLUSTER="$(pick ECS_CLUSTER)"
          SERVICE="$(pick ECS_FRONTEND_SERVICE)"
          if [ -z "$SERVICE" ]; then
            SERVICE="$(pick ECS_SERVICE)"
          fi

          if [ -z "$REGION" ]; then
            echo "AWS_REGION must be set as a repo variable or secret" >&2
            exit 1
          fi
          if [ -z "$CLUSTER" ]; then
            echo "ECS_CLUSTER_${UP} must be set as a secret" >&2
            exit 1
          fi
          if [ -z "$SERVICE" ]; then
            echo "ECS_FRONTEND_SERVICE_${UP} or ECS_SERVICE_${UP} must be set as a secret" >&2
            exit 1
          fi

          {
            echo "aws_region=$REGION"
            echo "ecs_cluster=$CLUSTER"
            echo "ecs_service=$SERVICE"
          } >> "$GITHUB_OUTPUT"
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ steps.vars.outputs.aws_region }}
 
      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client.Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.env.outputs.env_name }}-latest
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.env.outputs.env_name }}-${{ github.sha }}

      - name: Prune old ECR images for this environment
        shell: bash
        env:
          ENV_NAME: ${{ steps.env.outputs.env_name }}
          IMAGE_SHA: ${{ github.sha }}
          AWS_REGION: ${{ steps.vars.outputs.aws_region }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
        run: |
          set -euo pipefail

          KEEP_SHA_TAG="${ENV_NAME}-${IMAGE_SHA}"
          KEEP_LATEST_TAG="${ENV_NAME}-latest"

          IDS_TO_DELETE=$(aws ecr list-images \
            --repository-name "$ECR_REPOSITORY" \
            --region "$AWS_REGION" \
            --filter tagStatus=TAGGED \
            --query "imageIds[?starts_with(imageTag, \`${ENV_NAME}-\`) && imageTag != \`${KEEP_SHA_TAG}\` && imageTag != \`${KEEP_LATEST_TAG}\`]" \
            --output json)

          if [ "$(echo "$IDS_TO_DELETE" | jq 'length')" -gt 0 ]; then
            echo "$IDS_TO_DELETE" | jq -c '.[]' | while read -r ID; do
              aws ecr batch-delete-image \
                --repository-name "$ECR_REPOSITORY" \
                --region "$AWS_REGION" \
                --image-ids "$ID" >/dev/null
            done
            echo "Deleted $(echo "$IDS_TO_DELETE" | jq 'length') old tagged image(s)."
          else
            echo "No old ${ENV_NAME}-* tagged images to delete."
          fi

          UNTAGGED=$(aws ecr list-images \
            --repository-name "$ECR_REPOSITORY" \
            --region "$AWS_REGION" \
            --filter tagStatus=UNTAGGED \
            --query 'imageIds[*]' \
            --output json)

          if [ "$(echo "$UNTAGGED" | jq 'length')" -gt 0 ]; then
            aws ecr batch-delete-image \
              --repository-name "$ECR_REPOSITORY" \
              --region "$AWS_REGION" \
              --image-ids "$UNTAGGED" >/dev/null
            echo "Deleted $(echo "$UNTAGGED" | jq 'length') untagged image(s)."
          fi

      - name: Trigger ECS service redeploy
        run: |
          aws ecs update-service \
            --cluster "${{ steps.vars.outputs.ecs_cluster }}" \
            --service "${{ steps.vars.outputs.ecs_service }}" \
            --force-new-deployment